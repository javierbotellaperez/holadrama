<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAMA — Contact</title>
  <link rel="icon" type="image/png" href="../logo.jpg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="contact-style.css">
</head>
<body>

  <!-- NAVEGACIÓN EN LAS 4 ESQUINAS -->
  <a href="../music-videos/thumb/" class="corner-nav top-left">MUSIC VIDEOS</a>
  <a href="../events/" class="corner-nav top-right">EVENTS</a>
  <a href="../about/" class="corner-nav bottom-left">ABOUT</a>
  <a href="../" class="corner-nav bottom-right">HOME</a>

  <!-- CONTENEDOR PRINCIPAL CONTACTO -->
  <main class="contact-container">
    
    <h1 class="contact-title">GET IN TOUCH</h1>

    <!-- FORMULARIO DE CONTACTO POR MAIL -->
    <form class="contact-form" action="mailto:hi@javierbotellaperez.com" method="post" enctype="text/plain">
      
      <div class="form-group">
        <label for="name">NAME</label>
        <input type="text" id="name" name="Name" placeholder="Your Name" required>
      </div>

      <div class="form-group">
        <label for="email">EMAIL</label>
        <input type="email" id="email" name="Email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="subject">SUBJECT</label>
        <input type="text" id="subject" name="Subject" placeholder="Project / Inquiry" required>
      </div>

      <div class="form-group">
        <label for="message">MESSAGE</label>
        <textarea id="message" name="Message" rows="5" placeholder="Tell us about your idea..." required></textarea>
      </div>

      <button type="submit" class="submit-btn">SEND MESSAGE</button>

    </form>

    <!-- ENLACE E ICONO REDES SOCIALES (INSTAGRAM) -->
    <div class="social-section">
      <a href="https://www.instagram.com/holadrama/" target="_blank" rel="noopener noreferrer" class="instagram-link" aria-label="Instagram @holadrama">
