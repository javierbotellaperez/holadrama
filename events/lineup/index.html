<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAMA</title>
  <link rel="icon" type="image/png" href="../../logo.jpg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../events-style.css">
  <style>
    .event-detail-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .event-detail-header h1 {
      font-size: 2.8rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .event-subtitle {
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 0.5rem;
      opacity: 0.9;
    }

    .media-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .media-item {
      position: relative;
      aspect-ratio: 4/3;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      background: #000;
    }

    .media-item img, .media-item video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .media-item:hover img {
      transform: scale(1.05);
    }

    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 2rem; right: 2.5rem;
      color: #ff0000;
      font-size: 1.5rem;
      font-weight: 900;
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

  <!-- NAVEGACIÓN 4 ESQUINAS -->
  <a href="../" class="corner-nav top-left">← EVENTS</a>
  <a href="../../" class="corner-nav top-right">HOME</a>
  <a href="../../about/" class="corner-nav bottom-left">ABOUT</a>
  <a href="../../contact/" class="corner-nav bottom-right">CONTACT</a>

  <main class="events-container">
    
    <!-- ENCABEZADO DEL EVENTO -->
    <header class="event-detail-header">
      <h1>LINEUP</h1>
      <p class="event-subtitle">BARCELONA 2026 — DESIGN & PRODUCTION</p>
    </header>

    <!-- GALERÍA DE CONTENIDO DE LINEUP -->
    <div class="media-gallery">
      <div class="media-item" onclick="openLightbox('images/foto-01.jpg')">
        <img src="images/foto-01.jpg" alt="Lineup Photo 1">
      </div>
      <div class="media-item" onclick="openLightbox('images/foto-02.jpg')">
        <img src="images/foto-02.jpg" alt="Lineup Photo 2">
      </div>
      <div class="media-item" onclick="openLightbox('images/foto-03.jpg')">
        <img src="images/foto-03.jpg" alt="Lineup Photo 3">
      </div>
    </div>
      <div class="media-item" onclick="openLightbox('images/foto-04.jpg')">
        <img src="images/foto-04.jpg" alt="Lineup Photo 4">
      </div>
    </div>
  </main>
      <div class="media-item" onclick="openLightbox('images/foto-05.jpg')">
        <img src="images/foto-05.jpg" alt="Lineup Photo 5">
      </div>
    </div>  

  <!-- MODAL LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close">✕ CERRAR</button>
    <img id="lightbox-img" src="" alt="Ampliación">
  </div>

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }
  </script>

</body>
</html>
