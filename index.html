<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAMA</title>
  
  <!-- Tipografías de Google Fonts para las caligrafías específicas -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@700&family=Noto+Sans+SC:wght@700&family=Playfair+Display:ital,wght@1,700&family=Rozha+One&family=Yuji+Syuku&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="main-container">
    <!-- Lado izquierdo: Columna con Bucle Infinito -->
    <section class="left-section">
      <div class="ticker-wrapper">
        <!-- Generaremos las palabras dinámicamente con JavaScript -->
        <div id="ticker" class="ticker-track"></div>
      </div>
    </section>

    <!-- Lado derecho: Logo DRAMA -->
    <section class="right-section">
      <div class="logo-wrapper">
        <img src="logo.png" alt="DRAMA Logo" class="logo-img">
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
