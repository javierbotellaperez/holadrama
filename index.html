<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAMA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="main-container">
    <!-- Lado izquierdo: Hola en varios idiomas -->
    <section class="left-section">
      <div class="greeting-wrapper">
        <span id="greeting" class="greeting-text">Hola</span>
      </div>
    </section>

    <!-- Lado derecho: Logo DRAMA -->
    <section class="right-section">
      <div class="logo-wrapper">
        <!-- Reemplaza 'logo.jpg' por la ruta de tu archivo de imagen -->
        <img src="logo.png" alt="DRAMA Logo" class="logo-img">
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
