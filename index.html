<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAMA</title>
  
  <!-- Carga de Noto Sans con soporte para múltiples alfabetos -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@900&family=Noto+Sans+SC:wght@900&family=Noto+Sans:wght@900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">

  <!-- Colócalo dentro de la etiqueta <head> -->
<link rel="icon" type="image/png" href="logo.jpg">
  
</head>
<body>

  <!-- NAVEGACIÓN EN LAS 4 ESQUINAS (Enlaces directos a subcarpetas) -->
  <a href="./music-videos/" class="corner-nav top-left">Music Videos</a>
  <a href="./events/" class="corner-nav top-right">Events</a>
  <a href="./about/" class="corner-nav bottom-left">About</a>
  <a href="./contact/" class="corner-nav bottom-right">Contact</a>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="main-container">
    <!-- Lado izquierdo: Columna con Bucle Infinito -->
    <section class="left-section">
      <div class="ticker-wrapper">
        <div id="ticker" class="ticker-track"></div>
      </div>
    </section>

    <!-- Lado derecho: Logo DRAMA (Más pequeño) -->
    <section class="right-section">
      <div class="logo-wrapper">
        <img src="logo.png" alt="DRAMA Logo" class="logo-img">
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
