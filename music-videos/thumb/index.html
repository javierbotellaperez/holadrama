<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRAMA</title>
  <link rel="icon" type="image/png" href="../../logo.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="gallery-style.css">
</head>
<body>

  <!-- NAVEGACIÓN PRINCIPAL DE 4 ESQUINAS -->
  <a href="../" class="corner-nav top-left">HOME</a>
  <a href="../../events/" class="corner-nav top-right">EVENTS</a>
  <a href="../../about/" class="corner-nav bottom-left">ABOUT</a>
  <a href="../../contact/" class="corner-nav bottom-right">CONTACT</a>

  <!-- REJILLA DE MINIATURAS (GALLERY) -->
  <main class="gallery-container">
    <h1 class="gallery-title"></h1>

    <div class="gallery-grid">
      
      <!-- ITEM 1 -->
      <a href="../#mv1" class="thumb-card">
        <div class="thumb-wrapper">
          <video preload="metadata" muted onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0;">
            <source src="../videos/mv_000001.mp4#t=0.5" type="video/mp4">
          </video>
          <div class="overlay">
            <span class="play-icon">▶</span>
          </div>
        </div>
        <div class="thumb-info">
          <div class="main-details">
            <span class="song-title">MESSIAH</span>
            <span class="artist">SEVDALIZA</span>
          </div>
          <div class="director-detail">
            <span class="director-label">DIR.</span>
            <span class="director-name">TANU MUIÑO</span>
          </div>
        </div>
      </a>

      <!-- ITEM 2 -->
      <a href="../#mv2" class="thumb-card">
        <div class="thumb-wrapper">
          <video preload="metadata" muted onmouseover="this.play()" onmouseout="this.pause();this.currentTime=0;">
            <source src="../videos/mv_000002.mp4#t=0.5" type="video/mp4">
          </video>
          <div class="overlay">
            <span class="play-icon">▶</span>
          </div>
        </div>
        <div class="thumb-info">
          <div class="main-details">
            <span class="song-title">HEROINA</span>
            <span class="artist">SEVDALIZA</span>
          </div>
          <div class="director-detail">
            <span class="director-label">DIR.</span>
            <span class="director-name">TANU MUIÑO</span>
          </div>
        </div>
      </a>

    </div>
  </main>

</body>
</html>
